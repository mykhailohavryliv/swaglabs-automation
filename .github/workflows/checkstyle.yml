name: Code Quality
on: [push, pull_request]
jobs:
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Ruff Black
      run: pip install ruff black
    - name: Run Lint
      run: ruff check .
    - name: Black format check
      run: black --check .
